name: chat_app
description: Instant messaging client (Flutter) for the NestJS backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  socket_io_client: ^3.0.2
  http: ^1.2.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  intl: ^0.20.1
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.4
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  sqflite: ^2.4.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/stickers/