name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: truepilot2026
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: truepilot2026/chat:latest

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ssh.truepilot.io >> ~/.ssh/known_hosts

      - name: SCP files to server
        run: |
          scp docker-compose.yml ubuntu@ssh.truepilot.io:/apps/chat
          scp backend/db/0001-init.sql ubuntu@ssh.truepilot.io:/apps/chat/backend/db/0001-init.sql

      - name: Deploy via SSH
        run: |
          ssh ubuntu@ssh.truepilot.io << 'EOF'
            cd /apps/chat
            echo "FIREBASE_CREDENTIALS_BASE64=${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}" >> .env
            docker pull truepilot2026/chat:latest
            docker compose up -d
          EOF

      - name: Cleanup
        run: rm -rf ~/.ssh/id_rsa